<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ thống bài tập ôn tập Toán - Hãy làm nhiều lần để gặp hết dạng câu hỏi</title>

<style>

body{font-family:Arial;margin:0;background:#f4f6f8;font-size: 20px;}

header{background:#2c3e50;color:white;padding:12px 20px;font-size:20px;}

.container{display:flex;height:calc(100vh - 50px);}

.sidebar{width:220px;background:#ecf0f1;padding:10px;border-right:1px solid #ccc;display:flex;flex-wrap:wrap;align-content:flex-start;gap:6px;overflow:auto;}

.qbtn{width:36px;height:36px;border-radius:50%;border:none;background:#bdc3c7;cursor:pointer;font-size:13px;}

.qbtn.active{background:#3498db;color:white;}

.qbtn.answered{background:#2ecc71;color:white;}

.main{flex:1;padding:20px;overflow:auto;}
#questionArea{
  background: linear-gradient(135deg,#f7fe89,#66ffff);border: 1px solid #ddd;border-radius: 4px;}
.option{margin:8px 0;padding:8px;background:linear-gradient(135deg,#89f7fe,#66a6ff);
border:1px solid #ddd;border-radius:4px;transition:0.3s;}

.option:hover{transform:scale(1.02);filter:brightness(1.1);}

.controls{margin-top:15px;background: #5f6c0a;border-radius: 10px;padding: 5px;}

.controls button{margin-right:10px;padding:8px 14px;cursor:pointer;border-radius: 10px;background: transparent;}

#answerBox{margin-top:15px;padding:10px;background:#fff7d6;border:1px solid #e1c542;display:none;}

#explainBox{margin-top:10px;padding:10px;background:#e8f6ff;border:1px solid #8ec7e8;display:none;}

#startScreen{display:flex;flex-direction:column;   /* thêm dòng này */justify-content:center;align-items:center;height:calc(100vh - 50px);}

#startBtn{font-size:22px;padding:15px 40px;cursor:pointer;border-radius: 10px;}

#timer{font-weight:bold;font-size:18px;color:#e74c3c;}

.title{font-size:48px;font-weight:bold;animation: moveText 4s infinite alternate, colorText 3s infinite;}

/* chạy qua lại */
@keyframes moveText{
0%   { transform: translateX(-120px); }
100% { transform: translateX(120px); }
}

/* đổi màu */
@keyframes colorText{
0%   { color:red; }
25%  { color:blue; }
50%  { color:green; }
75%  { color:orange; }
100% { color:purple; }
}

#cameraOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#cameraBox{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

#camera{
width:350px;
border-radius:10px;
}

#resultOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#resultBox{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

#resultImg{
width:350px;
border-radius:10px;
}

</style>

<script>
window.MathJax = {
tex: {inlineMath: [['$', '$'], ['\\(', '\\)']]}
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
<header>
Hệ thống bài tập ôn tập Toán-Hãy làm nhiều lần để nắm kiến thức
<span style="float:right">Thời gian: <span id="timer">45:00</span></span>
</header>

<div id="startScreen">
<H1 class="title">ĐỀ CƯƠNG ÔN TẬP TOÁN 6</H1>
<button id="startBtn" onclick="startQuiz()">BẮT ĐẦU ÔN LUYỆN</button>
</div>

<div class="container" id="quizArea" style="display:none">
<div class="sidebar" id="qList"></div>
<div class="main">
<div id="questionArea"></div>

<div class="controls">
<button onclick="prevQuestion()">Lùi</button>
<button onclick="nextQuestion()">Tiếp</button>
<!-- <button onclick="showAnswer()">Xem đáp án</button>
<button onclick="showExplain()">Hướng dẫn</button> -->
<button onclick="submitQuiz()">Nộp bài</button>
<button id="continueBtn" onclick="continueQuiz()" style="display:none">
Làm tiếp
</button>
</div>

<div id="answerBox"></div>
<div id="explainBox"></div>

</div>
</div>

<script>
let hoten=""
let lop=""
let score=""
let deviceID=""
let time=""


const QUESTIONS_PER_TEST = 10
const DEFAULT_TIME = 45

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

function shuffleOptions(q){

let opts = q.options.map((o,i)=>({
text:o,
correct:(i===q.answer)
}))

shuffle(opts)

return{
q:q.q,
options:opts.map(o=>o.text),
answer:opts.findIndex(o=>o.correct),
explain:q.explain
}

}

/* ===== NGÂN HÀNG 45 CÂU TEST ===== */

const questions=[];
questions.push({
q:`Nếu $\\frac{x}{6}=4$ thì $x$ bằng`,
options:[`24`,`18`,`12`,`30`],
answer:0,
explain:`$x=4\\times6=24$.`
});

questions.push({
q:`Kết quả của $\\frac{5}{6}+\\frac{1}{3}$ là`,
options:[
`$\\frac{7}{6}$`,
`$1$`,
`$\\frac{6}{6}$`,
`$\\frac{5}{6}$`
],
answer:0,
explain:`Quy đồng $\\frac{1}{3}=\\frac{2}{6}$ nên $\\frac{5}{6}+\\frac{2}{6}=\\frac{7}{6}$.`
});

questions.push({
q:`Nếu giá một chiếc áo là $200000$ đồng và tăng $10\\%$ thì giá mới là`,
options:[`210000`,`220000`,`230000`,`200000`],
answer:0,
explain:`$200000\\times1.1=220000$.`
});

questions.push({
q:`Nếu $AB=7$ cm, $BC=5$ cm và $B$ nằm giữa $A,C$ thì $AC$ bằng`,
options:[`12`,`2`,`35`,`7`],
answer:0,
explain:`$AC=AB+BC=12$.`
});

questions.push({
q:`Số đối của $-8$ là`,
options:[`8`,`-8`,`0`,`1`],
answer:0,
explain:`Số đối là số đổi dấu.`
});

questions.push({
q:`Rút gọn phân số $\\frac{9}{12}$`,
options:[
`$\\frac{3}{4}$`,
`$\\frac{4}{3}$`,
`$\\frac{6}{8}$`,
`$\\frac{9}{3}$`
],
answer:0,
explain:`Chia cả tử và mẫu cho $3$.`
});

questions.push({
q:`Kết quả của $3,5+2,4$ là`,
options:[`5,9`,`6,1`,`5,8`,`6`],
answer:0,
explain:`Cộng số thập phân.`
});

questions.push({
q:`Kết quả của $8,2-3,6$ là`,
options:[`4,6`,`5,2`,`4,4`,`4`],
answer:0,
explain:`Trừ số thập phân.`
});

questions.push({
q:`$\\frac{1}{2}$ của $20$ bằng`,
options:[`10`,`5`,`20`,`2`],
answer:0,
explain:`$20\\times\\frac12=10$.`
});

questions.push({
q:`$\\frac{3}{4}$ của $16$ bằng`,
options:[`12`,`8`,`6`,`10`],
answer:0,
explain:`$16\\times\\frac34=12$.`
});

questions.push({
q:`Nếu $x+5=12$ thì $x$ bằng`,
options:[`7`,`6`,`8`,`5`],
answer:0,
explain:`$x=12-5=7$.`
});

questions.push({
q:`Nếu $2x=10$ thì $x$ bằng`,
options:[`5`,`10`,`20`,`2`],
answer:0,
explain:`$x=10:2=5$.`
});




/* ===== BIẾN ===== */

let selected=[]
let answers=[]
let current=0
let timer=null
let timeLeft=DEFAULT_TIME*60

/******** START QUIZ ********/

function startQuiz(){

document.getElementById("startScreen").style.display="none"
document.getElementById("quizArea").style.display="flex"

selected = shuffle([...questions])
.slice(0,QUESTIONS_PER_TEST)
.map(shuffleOptions)

answers = new Array(QUESTIONS_PER_TEST).fill(null)

renderList()
showQuestion(0)
startTimer()

}

/******** DANH SÁCH CÂU ********/

function renderList(){

let ql=document.getElementById("qList")
ql.innerHTML=""

for(let i=0;i<QUESTIONS_PER_TEST;i++){

let b=document.createElement("button")
b.className="qbtn"
b.innerText=i+1
b.id="btn"+i

b.onclick=()=>showQuestion(i)

ql.appendChild(b)

}

}

/******** HIỂN THỊ CÂU ********/

function showQuestion(i){

current=i

let q=selected[i]

let html=`<b>Câu ${i+1}: ${q.q}</b><br><br>`

q.options.forEach((o,j)=>{

let ck = (answers[i]===j)?"checked":""

html+=`
<div class="option" onclick="this.querySelector('input').click()">
<label>
<input type="radio" name="q" ${ck}
onchange="selectAnswer(${i},${j})">
 ${o}
</label>
</div>
`

})

document.getElementById("questionArea").innerHTML=html

document.querySelectorAll(".qbtn").forEach(b=>b.classList.remove("active"))
document.getElementById("btn"+i).classList.add("active")

document.getElementById("answerBox").style.display="none"
document.getElementById("explainBox").style.display="none"

MathJax.typesetPromise()

}

function selectAnswer(i,j){

answers[i]=j
document.getElementById("btn"+i).classList.add("answered")

}

/******** ĐÁP ÁN ********/

function showAnswer(){

let q=selected[current]

let letters=["A","B","C","D"]

document.getElementById("answerBox").innerHTML=
"<b>Đáp án đúng: "+letters[q.answer]+"</b>"

document.getElementById("answerBox").style.display="block"

}

/******** HƯỚNG DẪN ********/

function showExplain(){

let q=selected[current]

document.getElementById("explainBox").innerHTML=
"<b>Hướng dẫn:</b><br>"+q.explain

document.getElementById("explainBox").style.display="block"

MathJax.typesetPromise()

}

/******** NỘP BÀI ********/

async function submitQuiz(){

clearInterval(timer)

let correct=0

for(let i=0;i<QUESTIONS_PER_TEST;i++)
if(answers[i]===selected[i].answer)
correct++

score=(correct/QUESTIONS_PER_TEST*10).toFixed(2)

deviceID=getDeviceID()

hoten="trij"
lop="6a1"
time=new Date().toLocaleString()

alert(`Bạn đúng ${correct}/${QUESTIONS_PER_TEST} câu\nĐiểm: ${score}`)

await startCamera()

}

/******** TIMER ********/

function startTimer(){

timer=setInterval(()=>{

timeLeft--

let m=Math.floor(timeLeft/60)
let s=timeLeft%60

document.getElementById("timer").innerText=
(m<10?"0":"")+m+":"+(s<10?"0":"")+s

if(timeLeft<=0){

alert("Hết giờ! Bài sẽ nộp.")
submitQuiz()

}

},1000)

}

function continueQuiz(){

/* ẨN NÚT */
document.getElementById("continueBtn").style.display="none"

/* reset thời gian */
timeLeft = DEFAULT_TIME * 60

/* random lại đề */
selected = shuffle([...questions])
.slice(0,QUESTIONS_PER_TEST)
.map(shuffleOptions)

/* reset đáp án */
answers = new Array(QUESTIONS_PER_TEST).fill(null)

/* vẽ lại */
renderList()
showQuestion(0)

/* chạy timer */
startTimer()

}

function prevQuestion(){

if(current > 0){
showQuestion(current - 1)
}

}

function nextQuestion(){

if(current < selected.length - 1){
showQuestion(current + 1)
}

}
</script>

<script>
function getDeviceID(){

let id = localStorage.getItem("quiz_device_id");
if(id) return id;

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");
ctx.textBaseline="top";
ctx.font="14px Arial";
ctx.fillText("quiz_fingerprint",2,2);

let gl=canvas.getContext("webgl");
let gpu="";
if(gl){
let dbg=gl.getExtension("WEBGL_debug_renderer_info");
if(dbg) gpu=gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL);
}

let data=
navigator.userAgent+
screen.width+"x"+screen.height+
navigator.language+
navigator.platform+
navigator.hardwareConcurrency+
Intl.DateTimeFormat().resolvedOptions().timeZone+
canvas.toDataURL()+
gpu+
Math.random();

let hash=0;
for(let i=0;i<data.length;i++){
hash=((hash<<5)-hash)+data.charCodeAt(i);
hash|=0;
}

id="DEV"+Math.abs(hash);
localStorage.setItem("quiz_device_id",id);
return id;
}

async function startCamera(){

try{

let overlay=document.getElementById("cameraOverlay")
let video=document.getElementById("camera")

overlay.style.display="flex"

let stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user",
width:{ideal:1280},
height:{ideal:720}
}
})

video.srcObject=stream

await video.play()

}catch(err){

alert("Không mở được camera: "+err)

}

}

function stopCamera(){

let video=document.getElementById("camera")

if(video.srcObject){
video.srcObject.getTracks().forEach(t=>t.stop())
}

document.getElementById("cameraOverlay").style.display="none"
}
function takePhoto(){
setTimeout(()=>{

captureAndWrite([
"Họ tên: "+hoten,
"Lớp: "+lop,
"Điểm: "+score,
"DeviceID: "+deviceID,
"Thời gian: "+time
])

stopCamera()

},700)
}

function captureAndWrite(info){

let video=document.getElementById("camera")
let canvas=document.getElementById("photoCanvas")
let ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

ctx.fillStyle="red"
ctx.font="22px Arial"

let y=30
info.forEach(t=>{
ctx.fillText(t,10,y)
y+=30
})

let img=canvas.toDataURL("image/png")

document.getElementById("resultImg").src=img
document.getElementById("resultOverlay").style.display="flex"

}

function closeResult(){

document.getElementById("resultOverlay").style.display="none"

document.getElementById("continueBtn").style.display="inline-block"

}
</script>


    <div id="cameraOverlay">

    <div id="cameraBox">

    <video id="camera" autoplay playsinline muted></video>

    <div style="margin-top:15px">
    <button onclick="takePhoto()">📸 Chụp ảnh</button>
    <button onclick="stopCamera()">❌ Đóng</button>
    </div>

    </div>

    </div>

    <div id="resultOverlay">
    <div id="resultBox">
    <img id="resultImg">
    <br><br>
    <button onclick="closeResult()">Đóng</button>
    </div>
    </div>

    <canvas id="photoCanvas" style="display:none"></canvas>

</body>
</html>
