function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1))
    ;[arr[i],arr[j]]=[arr[j],arr[i]]
  }
  return arr
}


function shuffleOptions(q){

let opts = q.options.map((o,i)=>({
text:o,
correct:(i===q.answer)
}))

shuffle(opts)

return{
q:q.q,
options:opts.map(o=>o.text),
answer:opts.findIndex(o=>o.correct),
explain:q.explain
}

}



/* ===== BIẾN ===== */

let selected=[]
let answers=[]
let current=0
let timer=null
let timeLeft=DEFAULT_TIME*60

async function startQuiz(){
  if(!cameraReady){
    alert("Vui lòng bật camera trước khi bắt đầu");
  return;
  }

  /* ⭐ BẮT ĐẦU GIÁM SÁT TỪ ĐÂY */

  startFaceMonitor(
    document.getElementById("cameraPreview")
  );

  hoten = document.getElementById("hoten").value.trim();
  lop = document.getElementById("lop").value.trim();
  mon = document.getElementById("mon").value.trim();

  if(hoten=="" || lop=="" || mon==""){
  alert("Vui lòng nhập họ tên, môn và lớp");
  return;
  }

/* Tạo tên sheet */
  SHEET_NAME = mon + lop;
  questions = await loadQuestions(mon, lop);
  localStorage.setItem("hoten", hoten);
  localStorage.setItem("lop", lop);
  localStorage.setItem("mon", mon);
  localStorage.setItem("sheet", SHEET_NAME);
  localStorage.setItem("startTime", Date.now());
document.getElementById("startScreen").style.display="none"
document.getElementById("quizArea").style.display="flex"

selected = shuffle([...questions])
.slice(0,QUESTIONS_PER_TEST)
.map(shuffleOptions)

answers = new Array(QUESTIONS_PER_TEST).fill(null)

renderList()
showQuestion(0)
startTimer()

}

/******** DANH SÁCH CÂU ********/

function renderList(){

let ql=document.getElementById("qList")
  ql.innerHTML=""

  for(let i=0;i<QUESTIONS_PER_TEST;i++){

    let b=document.createElement("button")
    b.className="qbtn"
    b.innerText=i+1
    b.id="btn"+i
    b.onclick=()=>showQuestion(i)
    ql.appendChild(b)
  }
}

/******** HIỂN THỊ CÂU ********/

function showQuestion(i){
  current=i
  let q=selected[i]
  let html=`<b>Câu ${i+1}: ${q.q}</b><br><br>`
  q.options.forEach((o,j)=>{
    let ck = (answers[i]===j)?"checked":""
    html+=`
    <div class="option" onclick="this.querySelector('input').click()">
    <label>
    <input type="radio" name="q" ${ck}
    onchange="selectAnswer(${i},${j})">
     ${o}
    </label>
    </div>
    `
  })

  document.getElementById("questionArea").innerHTML=html
  document.querySelectorAll(".qbtn").forEach(b=>b.classList.remove("active"))
  document.getElementById("btn"+i).classList.add("active")
  document.getElementById("answerBox").style.display="none"
  document.getElementById("explainBox").style.display="none"
  MathJax.typesetPromise()
}

function selectAnswer(i,j){
  answers[i]=j
  document.getElementById("btn"+i).classList.add("answered")
}

/******** ĐÁP ÁN ********/

function showAnswer(){
  let q=selected[current]
  let letters=["A","B","C","D"]
  document.getElementById("answerBox").innerHTML=
  "<b>Đáp án đúng: "+letters[q.answer]+"</b>"
  document.getElementById("answerBox").style.display="block"
}

/******** HƯỚNG DẪN ********/

function showExplain(){

/******** NỘP BÀI ********/

async function submitQuiz(){
  clearInterval(timer)
  correct=0

  for(let i=0;i<QUESTIONS_PER_TEST;i++)
  if(answers[i]===selected[i].answer)
  correct++

  score=(correct/QUESTIONS_PER_TEST*10).toFixed(2)
  deviceID=getDeviceID()

  let start = localStorage.getItem("startTime");
  let end = Date.now();
  time = Math.floor((end - start)/1000);
  let m = Math.floor(time/60);
  let s = time%60;
  time = new Date().toLocaleString() + ";"+ String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');

  await startCamera()

}

/******** TIMER ********/
function startTimer(){
timer=setInterval(()=>{
  timeLeft--

  let m=Math.floor(timeLeft/60)
  let s=timeLeft%60

  document.getElementById("timer").innerText=
  (m<10?"0":"")+m+":"+(s<10?"0":"")+s

  if(timeLeft<=0){
    alert("Hết giờ! Bài sẽ nộp.")
    submitQuiz()
  }

  },1000)

}

function continueQuiz(){

  /* ẨN NÚT */
  document.getElementById("continueBtn").style.display="none"
  document.getElementById("nopbaiBtn").style.display="inline-block"
  /* reset thời gian */
  timeLeft = DEFAULT_TIME * 60
  /* random lại đề */
  selected = shuffle([...questions])
  .slice(0,QUESTIONS_PER_TEST)
  .map(shuffleOptions)

  /* reset đáp án */
  answers = new Array(QUESTIONS_PER_TEST).fill(null)

  /* vẽ lại */
  renderList()
  showQuestion(0)

  /* chạy timer */
  startTimer()
}

function prevQuestion(){
  if(current > 0){
  showQuestion(current - 1)

function nextQuestion(){
  if(current < selected.length - 1){
  showQuestion(current + 1)

}

function getDeviceID(){

  let id = localStorage.getItem("quiz_device_id");
  if(id) return id;

  let canvas=document.createElement("canvas");
  let ctx=canvas.getContext("2d");
  ctx.textBaseline="top";
  ctx.font="14px Arial";
  ctx.fillText("quiz_fingerprint",2,2);

  let gl=canvas.getContext("webgl");
  let gpu="";
  if(gl){
    let dbg=gl.getExtension("WEBGL_debug_renderer_info");
    if(dbg) gpu=gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL);
  }

  let data=
  navigator.userAgent+
  screen.width+"x"+screen.height+
  navigator.language+
  navigator.platform+
  navigator.hardwareConcurrency+
  Intl.DateTimeFormat().resolvedOptions().timeZone+
  canvas.toDataURL()+
  gpu+
  Math.random();

  let hash=0;
  for(let i=0;i<data.length;i++){
  hash=((hash<<5)-hash)+data.charCodeAt(i);
  hash|=0;
  }

  id="DEV"+Math.abs(hash);
  localStorage.setItem("quiz_device_id",id);
  return id;
  }

async function startCamera(){

  try{

    let overlay=document.getElementById("cameraOverlay")
    let video=document.getElementById("camera")

    overlay.style.display="flex"

    /* ⭐ DÙNG LẠI camera đã bật */

    video.srcObject = cameraStream;

    await video.play();

  }

  catch(err){

    alert("Không mở được camera: "+err)

  }

}

function stopCamera(){
  let video=document.getElementById("camera")
  if(video.srcObject){
    video.srcObject.getTracks().forEach(t=>t.stop())
  }

  document.getElementById("cameraOverlay").style.display="none"
  document.getElementById("continueBtn").style.display="inline-block"
  document.getElementById("nopbaiBtn").style.display="none"
}

function takePhoto(){
  document.getElementById("resultTxt").textContent ="Đợi gửi điểm..."
  setTimeout(()=>{
    captureAndWrite([
    "Loại: "+ APP_CHUDE,
    "Họ tên: "+hoten,
    "Lớp: "+lop,
    "Điểm: "+score,
    "DeviceID: "+deviceID,
    "Thời gian: "+time
    ])

    stopCamera()
  },700)
}

function captureAndWrite(info){
  let video=document.getElementById("camera")
  let canvas=document.getElementById("photoCanvas")
  let ctx=canvas.getContext("2d")

  canvas.width=video.videoWidth
  canvas.height=video.videoHeight

  ctx.drawImage(video,0,0)

  // thiết lập font
  ctx.font = "42px Arial"
  ctx.textBaseline = "top"

  let x = 20
  let y = 20
  let lineHeight = 55

  info.forEach(t=>{

    // đo kích thước chữ
    let w = ctx.measureText(t).width
    // nền đen mờ
    ctx.fillStyle = "rgba(0,0,0,0.6)"
    ctx.fillRect(x-10,y-5,w+20,50)
    // viền chữ
    ctx.strokeStyle = "black"
    ctx.lineWidth = 4
    ctx.strokeText(t,x,y)
    // chữ trắng
    ctx.fillStyle = "white"
    ctx.fillText(t,x,y)
    y += lineHeight
  })

  let img = canvas.toDataURL("image/jpeg",0.8)
  sendToSheet(img)
  document.getElementById("resultImg").src=img
  document.getElementById("resultOverlay").style.display="flex"
}

function closeResult(){
  document.getElementById("resultOverlay").style.display="none"
  document.getElementById("continueBtn").style.display="inline-block"

  document.getElementById("continueBtn").style.display="inline-block"
  document.getElementById("nopbaiBtn").style.display="none"
}

function sendToSheet(image){
  const formData=new FormData()
  formData.append("spreadsheetId",SHEET_ID)
  formData.append("sheetName",SHEET_NAME)
  formData.append("folderId",FOLDER_ID)

  formData.append("name",hoten)
  formData.append("class",lop)
  formData.append("score",score)
  formData.append("correct",correct)
  formData.append("device",deviceID)
  formData.append("time",time)
  formData.append("image",image)

  fetch(PATH_SHEET,{
  method:"POST",
  body:formData
    })
    .then(res=>res.text())
    .then(text=>{

      if(text=="OK"){
        document.getElementById("resultTxt").textContent ="Gửi kết quả thành công"
      }
      else{
        document.getElementById("resultTxt").textContent = "Server báo lỗi:"+text
      }

    })
    .catch(err=>{
      document.getElementById("resultTxt").textContent ="Lỗi kết nối:"+err
    })
}

document.getElementById("renameBox").style.display="flex"

async function hashName(name){
const encoder = new TextEncoder()
const data = encoder.encode(name)
const hashBuffer = await crypto.subtle.digest("SHA-256", data)
const hashArray = Array.from(new Uint8Array(hashBuffer))
return hashArray.map(b=>b.toString(16).padStart(2,"0")).join("")
}

async function checkCode(){
  let inputCode=document.getElementById("renameCode").value.trim()
  let oldName=localStorage.getItem("hoten")
  let trueCode=await hashName(oldName)
  if(inputCode===trueCode){
  alert("Mã đúng, bạn có thể nhập lại tên")
  document.getElementById("hoten").disabled = false;
  document.getElementById("lop").disabled = false;
  localStorage.removeItem("hoten")
  localStorage.removeItem("lop")
  document.getElementById("renameBox").style.display="none"
}else{
  alert("Mã không đúng")
}
}

function closeCode(){
  document.getElementById("renameBox").style.display="none"
}

async function initCameraPreview(){

  try{

    let video=document.getElementById("cameraPreview")

    cameraStream =
      await navigator.mediaDevices.getUserMedia({
        video:true
      })

    video.srcObject=cameraStream

    await video.play()

    cameraReady=true

    document.getElementById("camStatus").textContent =
      "✅ Camera đã bật"

    /* ❌ KHÔNG gọi startFaceMonitor ở đây */

  }

  catch(err){

    cameraReady=false

    document.getElementById("camStatus").textContent =
      "❌ Bạn chưa cho phép camera"

    alert("Bạn phải cho phép camera trước khi làm bài")

    console.error(err)

  }

}

async function loadFaceModels(){

  try{

    console.log("Loading model...");

    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);

    console.log("Model loaded OK");

  }

  catch(err){

    console.error("Model load error:", err);

    alert("Không tải được model nhận diện khuôn mặt.\nKiểm tra internet hoặc MODEL_URL.");

  }

}

let faceLostCount = 0;
let multiFaceCount = 0;

function startFaceMonitor(video){
  if(!quizStarted) return;
  if(monitorStarted) return;

  monitorStarted = true;

  setInterval(async ()=>{

    if(video.readyState !== 4) return;

    const detections =
      await faceapi.detectAllFaces(
        video,
        new faceapi.TinyFaceDetectorOptions()
      );

    /* phần còn lại giữ nguyên */

  },2000);

}
